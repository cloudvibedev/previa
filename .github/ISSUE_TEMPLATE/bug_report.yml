name: Bug report
description: Report a reproducible problem in Previa
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the problem
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Share the exact steps, commands, or requests needed to reproduce the issue
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste any relevant CLI output, server logs, or screenshots
      render: shell
  - type: input
    id: version
    attributes:
      label: Version
      description: Which `previa` version are you using?
      placeholder: e.g. 1.0.0-alpha.0
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime mode
      options:
        - Docker-backed
        - Binary-backed (--bin)
        - Remote runner / attached runner
        - Not sure
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, shell, Docker version, and anything else that may help
