name: Feature request
description: Suggest an improvement for Previa
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What is missing or painful today?
      placeholder: Describe the workflow or limitation
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see?
      placeholder: Describe the feature or behavior change
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Share example commands, screenshots, or related docs if helpful
