name: Release Binaries, Docker Images and Crates

on:
  workflow_dispatch:
    inputs:
      release_scope:
        description: "Release scope to publish: Linux full, macOS release, Windows release, or all platforms"
        required: true
        default: all
        type: choice
        options:
          - linux
          - mac
          - windows
          - all

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  version_check:
    name: Resolve And Validate Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve root workspace version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          workspace_version="$(
            awk '
              /^\[workspace\.package\]$/ { in_section=1; next }
              /^\[/ { in_section=0 }
              in_section && /^version[[:space:]]*=/ {
                match($0, /"([^"]+)"/, m)
                if (m[1] != "") {
                  print m[1]
                  exit
                }
              }
            ' Cargo.toml
          )"

          if [ -z "${workspace_version}" ]; then
            echo "::error::Could not resolve [workspace.package].version from Cargo.toml"
            exit 1
          fi

          echo "workspace=${workspace_version}"

          echo "version=${workspace_version}" >> "${GITHUB_OUTPUT}"

  resolve_scope:
    name: Resolve Release Scope
    needs: version_check
    runs-on: ubuntu-latest
    outputs:
      release_scope: ${{ steps.scope.outputs.release_scope }}
      build_matrix: ${{ steps.scope.outputs.build_matrix }}
      build_linux: ${{ steps.scope.outputs.build_linux }}
      build_macos: ${{ steps.scope.outputs.build_macos }}
      build_windows: ${{ steps.scope.outputs.build_windows }}
      publish_docker: ${{ steps.scope.outputs.publish_docker }}
      publish_crates: ${{ steps.scope.outputs.publish_crates }}
      publish_metadata: ${{ steps.scope.outputs.publish_metadata }}
      publish_github_release: ${{ steps.scope.outputs.publish_github_release }}
    steps:
      - name: Normalize release scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          scope="${{ inputs.release_scope }}"

          linux_matrix='[
            {"name":"linux-amd64","artifact_name":"release-linux-amd64","runs_on":"ubuntu-latest","target":"x86_64-unknown-linux-musl","os_slug":"linux","arch_slug":"amd64","exe_ext":"","use_cross":true,"build_runner":true,"build_main":true,"build_ctl":true},
            {"name":"linux-arm64","artifact_name":"release-linux-arm64","runs_on":"ubuntu-latest","target":"aarch64-unknown-linux-musl","os_slug":"linux","arch_slug":"arm64","exe_ext":"","use_cross":true,"build_runner":true,"build_main":true,"build_ctl":true}
          ]'
          mac_matrix='[
            {"name":"macos-amd64","artifact_name":"release-macos-amd64","runs_on":"macos-latest","target":"x86_64-apple-darwin","os_slug":"macos","arch_slug":"amd64","exe_ext":"","use_cross":false,"build_runner":false,"build_main":false,"build_ctl":true}
          ]'
          windows_matrix='[
            {"name":"windows-amd64","artifact_name":"release-windows-amd64","runs_on":"windows-latest","target":"x86_64-pc-windows-msvc","os_slug":"windows","arch_slug":"amd64","exe_ext":".exe","use_cross":false,"build_runner":false,"build_main":false,"build_ctl":true}
          ]'

          case "${scope}" in
            linux)
              build_linux=true
              build_macos=false
              build_windows=false
              publish_docker=true
              publish_crates=true
              publish_metadata=true
              build_matrix="${linux_matrix}"
              ;;
            mac)
              build_linux=false
              build_macos=true
              build_windows=false
              publish_docker=false
              publish_crates=false
              publish_metadata=false
              build_matrix="${mac_matrix}"
              ;;
            windows)
              build_linux=false
              build_macos=false
              build_windows=true
              publish_docker=false
              publish_crates=false
              publish_metadata=false
              build_matrix="${windows_matrix}"
              ;;
            all)
              build_linux=true
              build_macos=true
              build_windows=true
              publish_docker=true
              publish_crates=true
              publish_metadata=true
              build_matrix='[
                {"name":"linux-amd64","artifact_name":"release-linux-amd64","runs_on":"ubuntu-latest","target":"x86_64-unknown-linux-musl","os_slug":"linux","arch_slug":"amd64","exe_ext":"","use_cross":true,"build_runner":true,"build_main":true,"build_ctl":true},
                {"name":"linux-arm64","artifact_name":"release-linux-arm64","runs_on":"ubuntu-latest","target":"aarch64-unknown-linux-musl","os_slug":"linux","arch_slug":"arm64","exe_ext":"","use_cross":true,"build_runner":true,"build_main":true,"build_ctl":true},
                {"name":"macos-amd64","artifact_name":"release-macos-amd64","runs_on":"macos-latest","target":"x86_64-apple-darwin","os_slug":"macos","arch_slug":"amd64","exe_ext":"","use_cross":false,"build_runner":false,"build_main":false,"build_ctl":true},
                {"name":"windows-amd64","artifact_name":"release-windows-amd64","runs_on":"windows-latest","target":"x86_64-pc-windows-msvc","os_slug":"windows","arch_slug":"amd64","exe_ext":".exe","use_cross":false,"build_runner":false,"build_main":false,"build_ctl":true}
              ]'
              ;;
            *)
              echo "::error::Unsupported release scope: ${scope}"
              exit 1
              ;;
          esac

          {
            echo "release_scope=${scope}"
            echo "build_matrix<<EOF"
            echo "${build_matrix}"
            echo "EOF"
            echo "build_linux=${build_linux}"
            echo "build_macos=${build_macos}"
            echo "build_windows=${build_windows}"
            echo "publish_docker=${publish_docker}"
            echo "publish_crates=${publish_crates}"
            echo "publish_metadata=${publish_metadata}"
            echo "publish_github_release=true"
          } >> "${GITHUB_OUTPUT}"

  prepare_changelog:
    name: Prepare changelog
    needs: version_check
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.release_sha.outputs.release_sha }}
    env:
      VERSION: ${{ needs.version_check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: refs/heads/main
          fetch-depth: 0

      - name: Fetch tags
        shell: bash
        run: git fetch --force --tags

      - name: Generate changelog and release notes
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/generate_changelog.py \
            --version "${VERSION}" \
            --changelog CHANGELOG.md \
            --release-notes RELEASE_NOTES.md

      - name: Commit changelog update if needed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- CHANGELOG.md; then
            echo "CHANGELOG.md already up to date."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add CHANGELOG.md
          git commit -m "docs(changelog): update for v${VERSION}"
          git push origin HEAD:main

      - name: Record release sha
        id: release_sha
        shell: bash
        run: |
          set -euo pipefail
          echo "release_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md
          if-no-files-found: error

  build_binaries:
    name: Build binaries (${{ matrix.name }})
    needs: [version_check, resolve_scope, prepare_changelog, tag_release]
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.resolve_scope.outputs.build_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_changelog.outputs.release_sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup QEMU
        if: matrix.use_cross == true
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        if: matrix.use_cross == true
        uses: docker/setup-buildx-action@v3

      - name: Install cross
        if: matrix.use_cross == true
        shell: bash
        run: cargo install cross --locked

      - name: Build selected binaries
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            if [ "${{ matrix.build_runner }}" = "true" ]; then
              cross build --release --target "${{ matrix.target }}" -p previa-runner
            fi
            if [ "${{ matrix.build_main }}" = "true" ]; then
              cross build --release --target "${{ matrix.target }}" -p previa-main
            fi
            if [ "${{ matrix.build_ctl }}" = "true" ]; then
              cross build --release --target "${{ matrix.target }}" -p previa
            fi
          else
            if [ "${{ matrix.build_runner }}" = "true" ]; then
              cargo build --release --target "${{ matrix.target }}" -p previa-runner
            fi
            if [ "${{ matrix.build_main }}" = "true" ]; then
              cargo build --release --target "${{ matrix.target }}" -p previa-main
            fi
            if [ "${{ matrix.build_ctl }}" = "true" ]; then
              cargo build --release --target "${{ matrix.target }}" -p previa
            fi
          fi

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          if [ "${{ matrix.build_main }}" = "true" ]; then
            main_src="target/${{ matrix.target }}/release/previa-main${{ matrix.exe_ext }}"
            main_asset="previa-main-${{ matrix.os_slug }}-${{ matrix.arch_slug }}${{ matrix.exe_ext }}"
            cp "${main_src}" "dist/${main_asset}"
          fi

          if [ "${{ matrix.build_runner }}" = "true" ]; then
            runner_src="target/${{ matrix.target }}/release/previa-runner${{ matrix.exe_ext }}"
            runner_asset="previa-runner-${{ matrix.os_slug }}-${{ matrix.arch_slug }}${{ matrix.exe_ext }}"
            cp "${runner_src}" "dist/${runner_asset}"
          fi

          if [ "${{ matrix.build_ctl }}" = "true" ]; then
            ctl_src="target/${{ matrix.target }}/release/previa${{ matrix.exe_ext }}"
            ctl_asset="previa-${{ matrix.os_slug }}-${{ matrix.arch_slug }}${{ matrix.exe_ext }}"
            cp "${ctl_src}" "dist/${ctl_asset}"
          fi

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/*
          if-no-files-found: error

  tag_release:
    name: Create git tag
    needs: [version_check, prepare_changelog]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version_check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_changelog.outputs.release_sha }}
          fetch-depth: 0

      - name: Create tag if missing
        shell: bash
        run: |
          set -euo pipefail
          tag="v${VERSION}"
          git fetch --tags

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on remote, skipping creation."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag "${tag}"
          if git push origin "refs/tags/${tag}"; then
            echo "Tag ${tag} created and pushed."
          elif git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} was created concurrently, continuing."
          else
            echo "::error::Failed to push tag ${tag}"
            exit 1
          fi

  github_release:
    name: Publish GitHub Release
    needs: [version_check, resolve_scope, prepare_changelog, tag_release, build_binaries]
    if: needs.resolve_scope.outputs.publish_github_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: release-meta

      - name: Create release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version_check.outputs.version }}
          name: Release v${{ needs.version_check.outputs.version }}
          files: release-assets/*
          body_path: release-meta/RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish_release_metadata:
    name: Publish release metadata
    needs: [version_check, resolve_scope, github_release]
    if: needs.resolve_scope.outputs.publish_metadata == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version_check.outputs.version }}
      RELEASE_SCOPE: ${{ needs.resolve_scope.outputs.release_scope }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: refs/heads/main
          fetch-depth: 0

      - name: Validate installer script
        shell: bash
        run: |
          set -euo pipefail
          sh -n install.sh

      - name: Generate release metadata
        shell: bash
        run: |
          set -euo pipefail
          export PUBLISHED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          python3 scripts/generate_release_metadata.py

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          python3 -m json.tool release-metadata.json >/dev/null

      - name: Commit release metadata if needed
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- release-metadata.json; then
            echo "release-metadata.json already up to date."
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add release-metadata.json
          git commit -m "ci: update release metadata for v${VERSION}"
          git pull --rebase origin main
          git push origin HEAD:main

  docker_build_arch:
    name: Build and push Docker (${{ matrix.service }}-${{ matrix.arch }})
    needs: [version_check, resolve_scope, prepare_changelog, build_binaries]
    if: needs.resolve_scope.outputs.publish_docker == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: previa-runner
            image: ghcr.io/cloudvibedev/runner
            arch: amd64
          - service: previa-runner
            image: ghcr.io/cloudvibedev/runner
            arch: arm64
          - service: previa-main
            image: ghcr.io/cloudvibedev/main
            arch: amd64
          - service: previa-main
            image: ghcr.io/cloudvibedev/main
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_changelog.outputs.release_sha }}

      - name: Download Linux binaries artifact
        uses: actions/download-artifact@v4
        with:
          name: release-linux-${{ matrix.arch }}
          path: downloaded

      - name: Prepare Docker artifact layout
        shell: bash
        run: |
          set -euo pipefail

          src_file="${{ matrix.service }}-linux-${{ matrix.arch }}"
          mkdir -p "artifacts/${{ matrix.service }}/${{ matrix.arch }}"
          cp "downloaded/${src_file}" "artifacts/${{ matrix.service }}/${{ matrix.arch }}/${{ matrix.service }}"
          chmod +x "artifacts/${{ matrix.service }}/${{ matrix.arch }}/${{ matrix.service }}"

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.artifact
          platforms: linux/${{ matrix.arch }}
          push: true
          tags: |
            ${{ matrix.image }}:latest-${{ matrix.arch }}
            ${{ matrix.image }}:${{ needs.version_check.outputs.version }}-${{ matrix.arch }}
          build-args: |
            BIN_NAME=${{ matrix.service }}
            TARGETARCH=${{ matrix.arch }}
            ARTIFACT_ROOT=artifacts
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

  docker_manifest:
    name: Create Docker manifests
    needs: [version_check, resolve_scope, docker_build_arch]
    if: needs.resolve_scope.outputs.publish_docker == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: ghcr.io/cloudvibedev/main
          - image: ghcr.io/cloudvibedev/runner
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest
        shell: bash
        env:
          VERSION: ${{ needs.version_check.outputs.version }}
        run: |
          set -euo pipefail
          image="${{ matrix.image }}"

          docker buildx imagetools create \
            -t "${image}:latest" \
            -t "${image}:${VERSION}" \
            "${image}:latest-amd64" \
            "${image}:latest-arm64" \
            "${image}:${VERSION}-amd64" \
            "${image}:${VERSION}-arm64"

  publish_crates:
    name: Publish crates.io packages
    needs: [version_check, resolve_scope, prepare_changelog, build_binaries]
    if: needs.resolve_scope.outputs.publish_crates == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_changelog.outputs.release_sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Package previa-engine
        shell: bash
        run: cargo package -p previa-engine --allow-dirty --no-verify

      - name: Publish previa-engine
        shell: bash
        run: |
          set -euo pipefail
          set +e
          output="$(cargo publish -p previa-engine --no-verify 2>&1)"
          status=$?
          set -e
          echo "${output}"
          if [ ${status} -ne 0 ]; then
            if echo "${output}" | grep -q "already exists on crates.io index"; then
              echo "previa-engine already published at this version, continuing."
            else
              exit ${status}
            fi
          fi

      - name: Wait for previa-engine indexing
        shell: bash
        run: sleep 30

      - name: Package previa-runner
        shell: bash
        run: cargo package -p previa-runner --allow-dirty --no-verify

      - name: Publish previa-runner
        shell: bash
        run: |
          set -euo pipefail
          set +e
          output="$(cargo publish -p previa-runner --no-verify 2>&1)"
          status=$?
          set -e
          echo "${output}"
          if [ ${status} -ne 0 ]; then
            if echo "${output}" | grep -q "already exists on crates.io index"; then
              echo "previa-runner already published at this version, continuing."
            else
              exit ${status}
            fi
          fi

      - name: Wait for previa-runner indexing
        shell: bash
        run: sleep 30

      - name: Package previa-main
        shell: bash
        run: cargo package -p previa-main --allow-dirty --no-verify

      - name: Publish previa-main
        shell: bash
        run: |
          set -euo pipefail
          set +e
          output="$(cargo publish -p previa-main --no-verify 2>&1)"
          status=$?
          set -e
          echo "${output}"
          if [ ${status} -ne 0 ]; then
            if echo "${output}" | grep -q "already exists on crates.io index"; then
              echo "previa-main already published at this version, continuing."
            else
              exit ${status}
            fi
          fi
