name: Kubernetes Plugin

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/kubernetes-plugin.yaml
      - Cargo.lock
      - Cargo.toml
      - Dockerfile.kubernetes-plugin
      - kubernetes-plugin/**
      - runner/**

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/runvibe/previa-kubernetes-plugin

jobs:
  test:
    name: Test plugin
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Test plugin crate
        run: cargo test -p previa-kubernetes-plugin

      - name: Build plugin crate
        run: cargo build --release -p previa-kubernetes-plugin

  image:
    name: Build and publish image
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.kubernetes-plugin
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=kubernetes-plugin
          cache-to: type=gha,mode=max,scope=kubernetes-plugin
