<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="40" y1="40" x2="1240" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F8EF7"/>
      <stop offset="1" stop-color="#2E6DEB"/>
    </linearGradient>
    <linearGradient id="panel" x1="130" y1="90" x2="420" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.10)"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1280" height="640" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#163A91" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="32" fill="url(#bg)"/>

  <circle cx="1170" cy="84" r="180" fill="white" fill-opacity="0.06"/>
  <circle cx="1045" cy="558" r="220" fill="white" fill-opacity="0.05"/>
  <circle cx="78" cy="570" r="140" fill="white" fill-opacity="0.05"/>

  <g filter="url(#shadow)">
    <rect x="88" y="84" width="360" height="472" rx="36" fill="url(#panel)"/>
    <rect x="88" y="84" width="360" height="472" rx="36" stroke="white" stroke-opacity="0.18" stroke-width="1.5"/>
    <image href="logo.png" x="144" y="140" width="248" height="248"/>

    <text x="144" y="438" fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="1.5">PREVIA</text>
    <text x="144" y="474" fill="white" fill-opacity="0.78" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" font-weight="500">AI-First IDE for QA</text>
  </g>

  <text x="510" y="182" fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="56" font-weight="800">
    The first AI-First IDE for QA
  </text>

  <text x="510" y="258" fill="white" fill-opacity="0.92" font-family="DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="500">
    Test, design, and validate APIs with AI assistance
  </text>
  <text x="510" y="298" fill="white" fill-opacity="0.92" font-family="DejaVu Sans, Arial, sans-serif" font-size="28" font-weight="500">
    from your desktop, CI/CD, or your favorite AI assistant.
  </text>

  <g>
    <rect x="510" y="366" width="142" height="44" rx="22" fill="white" fill-opacity="0.14"/>
    <text x="546" y="394" fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" font-weight="700">E2E</text>

    <rect x="666" y="366" width="168" height="44" rx="22" fill="white" fill-opacity="0.14"/>
    <text x="700" y="394" fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" font-weight="700">Load Tests</text>

    <rect x="848" y="366" width="118" height="44" rx="22" fill="white" fill-opacity="0.14"/>
    <text x="882" y="394" fill="white" font-family="DejaVu Sans, Arial, sans-serif" font-size="20" font-weight="700">MCP</text>
  </g>

  <text x="510" y="480" fill="white" fill-opacity="0.82" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="500">
    Simulate, execute, and trace real API workflows.
  </text>
  <text x="510" y="518" fill="white" fill-opacity="0.82" font-family="DejaVu Sans, Arial, sans-serif" font-size="24" font-weight="500">
    See exactly what happened, where it failed, and why.
  </text>

  <text x="510" y="584" fill="white" fill-opacity="0.62" font-family="DejaVu Sans, Arial, sans-serif" font-size="22" font-weight="600">
    previa.dev
  </text>
</svg>
